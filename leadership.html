        <h3>Overview</h3>
        <p>
            The ARISE CyberAI Scholarship for Service (SFS) program is led by a multidisciplinary team of faculty 
            within the Department of Computer Science and Engineering at the University of Central Arkansas. 
            The leadership structure ensures coordinated execution of recruitment, training, research, and workforce 
            placement aligned with national cybersecurity workforce priorities.
        </p>

        <h3>Program Director</h3>
        <div class="card">

        <h3>Program Committees</h3>
        <p>
            The ARISE program is supported by dedicated faculty committees that ensure structured 
            implementation and continuous program improvement.
        </p>

        <ul>
            <li><strong>Scholar Recruitment and Selection Committee:</strong> Manages outreach, application evaluation, and scholar selection.</li>
            <li><strong>Curriculum and Research Committee:</strong> Oversees CyberAI coursework, research integration, and mentoring.</li>
            <li><strong>Internship and Workforce Pathways Committee:</strong> Coordinates internships, job placement, and government partnerships.</li>
            <li><strong>Assessment and Evaluation Committee:</strong> Monitors program effectiveness, scholar progress, and outcomes.</li>
        </ul>

        <h3>External Advisory Board</h3>
        <p>
            The program is supported by an external advisory board composed of experts from government, 
            industry, and academia. The board provides guidance on curriculum relevance, workforce alignment, 
            and internship and employment opportunities for scholars.
